name: Build & Push Frontend (GHCR)

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      packages: write

    steps:
      # - name: Checkout
      #   uses: actions/checkout@v4
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Определяем тип bump по коммитам
      # - name: Determine version bump
      #   id: bump
      #   run: |
      #     COMMITS=$(git log $(git describe --tags --abbrev=0)..HEAD --pretty=format:"%s")
      #     echo "Commits to consider for bump:"
      #     echo "$COMMITS"

      #     if echo "$COMMITS" | grep -q "BREAKING CHANGE\|!"; then
      #       echo "bump=major" >> $GITHUB_OUTPUT
      #     elif echo "$COMMITS" | grep -q "^feat"; then
      #       echo "bump=minor" >> $GITHUB_OUTPUT
      #     else
      #       echo "bump=patch" >> $GITHUB_OUTPUT


      - name: Determine version bump
        id: bump
        run: |
          git fetch --tags

          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")

          if [ -z "$LAST_TAG" ]; then
            echo "bump=patch" >> $GITHUB_OUTPUT
            exit 0
          fi

          COMMITS=$(git log ${LAST_TAG}..HEAD --pretty=format:"%s")

          if echo "$COMMITS" | grep "BREAKING CHANGE\|!"; then
            BUMP=major
          elif echo "$COMMITS" | grep -q "^feat"; then 
            BUMP=minor
          else
            BUMP=patch

          echo "bump=$BUMP" >> $GITHUB_OUTPUT      

      # Получаем последний тег и считаем новый с учетом bump
      - name: Get latest tag
        id: tag
        run: |
          git fetch --tags
          LAST_TAG=$(git tag --sort=-v:refname | head -n 1)

          if [ -z "$LAST_TAG" ]; then
            MAJOR=0
            MINOR=1
            PATCH=0
          else
            VERSION=${LAST_TAG#v}
            IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          fi

          case "${{ steps.bump.outputs.bump }}" in
            major)
              MAJOR=$((MAJOR+1))
              MINOR=0
              PATCH=0
              ;;
            minor)
              MINOR=$((MINOR+1))
              PATCH=0
              ;;
            patch)
              PATCH=$((PATCH+1))
              ;;
          esac

          NEW_TAG="v$MAJOR.$MINOR.$PATCH"
          echo "tag=$NEW_TAG" >> $GITHUB_OUTPUT
          echo "New tag will be $NEW_TAG"

      # Создаём и пушим git tag
      - name: Create git tag
        run: |
          git tag ${{ steps.tag.outputs.tag }}
          git push origin ${{ steps.tag.outputs.tag }}

      # Логинимся в GHCR
      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      # Сборка и пуш Docker образа
      - name: Build and push
        run: |
          docker build -t ghcr.io/${{ github.repository }}/frontend:${{ steps.tag.outputs.tag }} .
          docker push ghcr.io/${{ github.repository }}/frontend:${{ steps.tag.outputs.tag }}